name: Telegram Command Listener

# Long-polls Telegram getUpdates so slash commands get answered live, 24/7.
#
# GitHub caps a job at 6 h, so continuous coverage = a relay: each run holds
# a ~5h45m window, while starter crons fire every 30 min as the next runner
# in line (they QUEUE behind the active window and take over the moment it
# exits — handoff gap is ~1 min of job setup). GitHub cron is unreliable
# (2026-07-09: one fire skipped, another 3.5 h late), which is exactly why
# the starters are this frequent: any single one that runs covers hours.
on:
  schedule:
    - cron: "5,35 * * * *"   # every 30 min, around the clock, every day

  workflow_dispatch:
    inputs:
      minutes:
        description: "How long to listen (minutes)"
        required: false
        default: "15"

# Exactly one listener may poll at a time (two would steal each other's
# updates). cancel-in-progress is OFF on purpose: backups QUEUE behind the
# active listener instead of killing it. When the active one exits at market
# close, the queued backup starts, sees the market is closed, and exits in
# seconds (bot.py computes the remaining window).
concurrency:
  group: telegram-listener
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # GitHub-hosted job hard limit is 6 h
    permissions:
      contents: write   # /setstrategy commits data/config.json back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Listen for commands
        env:
          PYTHONUNBUFFERED: "1"   # stream log lines live instead of at exit
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
          RUN_TYPE: listen
          # Scheduled runs leave this empty → bot.py listens until 15:35 IST.
          # Manual dispatch passes an explicit test window.
          LISTEN_MINUTES: ${{ github.event.inputs.minutes || '' }}
          # No STRATEGY here — the listener resolves data/config.json
          # (/setstrategy) → ACTIVE_STRATEGY_VAR → adaptive, live per command.
          ACTIVE_STRATEGY_VAR: ${{ vars.ACTIVE_STRATEGY || '' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: python bot.py
