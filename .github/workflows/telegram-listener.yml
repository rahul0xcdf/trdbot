name: Telegram Command Listener

# Long-polls Telegram getUpdates so slash commands get answered live.
# Two back-to-back windows cover market hours (crons are UTC; comments IST).
# NOTE: GitHub cron can fire several minutes late — coverage starts then.
on:
  schedule:
    # Scheduled ~10 min early — GitHub cron usually fires 5–30 min late.
    - cron: "20 3 * * 1-5"   # target 9:00 AM IST  → listens ~3h15m
    - cron: "35 6 * * 1-5"   # target 12:15 PM IST → listens ~3h15m

  workflow_dispatch:
    inputs:
      minutes:
        description: "How long to listen (minutes)"
        required: false
        default: "15"

# If a delayed window is still running when the next starts, cancel the old
# one — exactly one listener polls at a time (two would steal each other's
# updates).
concurrency:
  group: telegram-listener
  cancel-in-progress: true

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    permissions:
      contents: write   # /setstrategy commits data/config.json back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Listen for commands
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
          RUN_TYPE: listen
          LISTEN_MINUTES: ${{ github.event.inputs.minutes || '195' }}
          # No STRATEGY here — the listener resolves data/config.json
          # (/setstrategy) → ACTIVE_STRATEGY_VAR → adaptive, live per command.
          ACTIVE_STRATEGY_VAR: ${{ vars.ACTIVE_STRATEGY || '' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: python bot.py
