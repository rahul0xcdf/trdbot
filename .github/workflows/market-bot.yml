name: Market Intelligence Bot

on:
  # ── Scheduled runs (all cron in UTC; comments show IST) — Mon–Fri ──────────
  schedule:
    - cron: "45 2 * * 1-5"      # 8:15 AM IST  → premarket
    - cron: "0 4 * * 1-5"       # 9:30 AM IST  → opening
    - cron: "30 5 * * 1-5"      # 11:00 AM IST → midmorning
    - cron: "0 7 * * 1-5"       # 12:30 PM IST → european_open
    - cron: "0 8 * * 1-5"       # 1:30 PM IST  → london_us
    - cron: "15 9 * * 1-5"      # 2:45 PM IST  → exit_reminder
    - cron: "30 10 * * 1-5"     # 4:00 PM IST  → eod
    - cron: "*/30 4-10 * * 1-5" # every 30 min market hours → vix_check

  # ── Manual trigger (for testing any flow on demand) ────────────────────────
  workflow_dispatch:
    inputs:
      run_type:
        description: "Which flow to run"
        required: false
        default: "premarket"
        type: choice
        options:
          - premarket
          - opening
          - midmorning
          - european_open
          - london_us
          - exit_reminder
          - eod
          - vix_check
      strategy:
        description: "Strategy to use"
        required: false
        default: "adaptive"
        type: choice
        options:
          - adaptive
          - nifty_intraday
          - balanced
          - momentum
          - conservative
          - sentiment_first
      model:
        description: "Gemini model"
        required: false
        default: "gemini-2.5-flash"
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Map the firing cron → RUN_TYPE (or use the manual input) ───────────
      #    github.event.schedule holds the exact cron string that fired.
      - name: Resolve RUN_TYPE
        run: |
          if [ -n "${{ github.event.inputs.run_type }}" ]; then
            RUN_TYPE="${{ github.event.inputs.run_type }}"
          else
            case "${{ github.event.schedule }}" in
              "45 2 * * 1-5")      RUN_TYPE=premarket ;;
              "0 4 * * 1-5")       RUN_TYPE=opening ;;
              "30 5 * * 1-5")      RUN_TYPE=midmorning ;;
              "0 7 * * 1-5")       RUN_TYPE=european_open ;;
              "0 8 * * 1-5")       RUN_TYPE=london_us ;;
              "15 9 * * 1-5")      RUN_TYPE=exit_reminder ;;
              "30 10 * * 1-5")     RUN_TYPE=eod ;;
              "*/30 4-10 * * 1-5") RUN_TYPE=vix_check ;;
              *)                   RUN_TYPE=premarket ;;
            esac
          fi
          echo "RUN_TYPE=$RUN_TYPE" >> "$GITHUB_ENV"
          echo "Resolved RUN_TYPE=$RUN_TYPE"

      - name: Run Market Bot
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_API_KEY:       ${{ secrets.GNEWS_API_KEY }}
          RUN_TYPE:            ${{ env.RUN_TYPE }}
          STRATEGY: >-
            ${{
              github.event.inputs.strategy ||
              vars.ACTIVE_STRATEGY ||
              'adaptive'
            }}
          GEMINI_MODEL: >-
            ${{
              github.event.inputs.model ||
              vars.GEMINI_MODEL ||
              'gemini-2.5-flash'
            }}
        run: python bot.py

      # ── On failure — notify Telegram (skip for silent vix_check noise) ─────
      - name: Notify on failure
        if: failure() && env.RUN_TYPE != 'vix_check'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ Market Bot failed (RUN_TYPE=${{ env.RUN_TYPE }}). Check: ${{ github.server_url }}/${{ github.repository }}/actions" \
            -d parse_mode="HTML"
