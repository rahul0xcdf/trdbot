name: Market Intelligence Bot

on:
  # ── Scheduled runs (all cron in UTC; comments show IST) — Mon–Fri ──────────
  # GitHub cron is best-effort and usually fires 5–30 min LATE, worst at
  # congested minutes (:00/:30). So each job is scheduled ~10 min before its
  # target IST time, on uncongested minutes, to land near the target.
  schedule:
    - cron: "33 2 * * 1-5"      # target 8:15 AM IST  → premarket
    - cron: "52 3 * * 1-5"      # target 9:30 AM IST  → opening
    - cron: "23 5 * * 1-5"      # target 11:00 AM IST → midmorning
    - cron: "53 6 * * 1-5"      # target 12:30 PM IST → european_open
    - cron: "53 7 * * 1-5"      # target 1:30 PM IST  → london_us
    - cron: "9 9 * * 1-5"       # target 2:45 PM IST  → exit_reminder
    - cron: "23 10 * * 1-5"     # target 4:00 PM IST  → eod
    - cron: "11,41 4-10 * * 1-5" # ~every 30 min market hours → vix_check

  # ── Manual trigger (for testing any flow on demand) ────────────────────────
  workflow_dispatch:
    inputs:
      run_type:
        description: "Which flow to run"
        required: false
        default: "premarket"
        type: choice
        options:
          - premarket
          - opening
          - midmorning
          - european_open
          - london_us
          - exit_reminder
          - eod
          - vix_check
      strategy:
        description: "Strategy (configured = whatever /setstrategy or ACTIVE_STRATEGY says)"
        required: false
        default: "configured"
        type: choice
        options:
          - configured
          - adaptive
          - nifty_intraday
          - balanced
          - momentum
          - conservative
          - sentiment_first
      model:
        description: "Gemini model"
        required: false
        default: "gemini-2.5-flash"
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # premarket/eod commit data/ back for persistence

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Map the firing cron → RUN_TYPE (or use the manual input) ───────────
      #    github.event.schedule holds the exact cron string that fired.
      - name: Resolve RUN_TYPE
        run: |
          if [ -n "${{ github.event.inputs.run_type }}" ]; then
            RUN_TYPE="${{ github.event.inputs.run_type }}"
          else
            case "${{ github.event.schedule }}" in
              "33 2 * * 1-5")        RUN_TYPE=premarket ;;
              "52 3 * * 1-5")        RUN_TYPE=opening ;;
              "23 5 * * 1-5")        RUN_TYPE=midmorning ;;
              "53 6 * * 1-5")        RUN_TYPE=european_open ;;
              "53 7 * * 1-5")        RUN_TYPE=london_us ;;
              "9 9 * * 1-5")         RUN_TYPE=exit_reminder ;;
              "23 10 * * 1-5")       RUN_TYPE=eod ;;
              "11,41 4-10 * * 1-5")  RUN_TYPE=vix_check ;;
              *)                     RUN_TYPE=premarket ;;
            esac
          fi
          echo "RUN_TYPE=$RUN_TYPE" >> "$GITHUB_ENV"
          echo "Resolved RUN_TYPE=$RUN_TYPE"

      - name: Run Market Bot
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_API_KEY:       ${{ secrets.GNEWS_API_KEY }}
          RUN_TYPE:            ${{ env.RUN_TYPE }}
          # Precedence lives in modules/config.py: explicit STRATEGY input →
          # data/config.json (/setstrategy) → ACTIVE_STRATEGY_VAR → adaptive.
          # "configured" is not a real strategy, so it falls through to config.
          STRATEGY: ${{ github.event.inputs.strategy || '' }}
          ACTIVE_STRATEGY_VAR: ${{ vars.ACTIVE_STRATEGY || '' }}
          GEMINI_MODEL: >-
            ${{
              github.event.inputs.model ||
              vars.GEMINI_MODEL ||
              'gemini-2.5-flash'
            }}
        run: python bot.py

      # ── Persist generated data back to the repo ─────────────────────────────
      #    The runner is ephemeral: without this, the premarket report cache
      #    (served by the command listener) and the signal history DB (used by
      #    backtest.py) are lost when the job exits.
      - name: Persist data (report + signal history)
        if: env.RUN_TYPE == 'premarket' || env.RUN_TYPE == 'eod'
        run: |
          git config user.name "market-bot[actions]"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/premarket_report.json data/signals.db 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to persist"
          else
            git commit -m "chore: persist ${RUN_TYPE} data ($(date -u +%F))"
            git pull --rebase origin main || true
            git push origin HEAD:main || echo "[WARN] data push failed (non-fatal)"
          fi

      # ── On failure — notify Telegram (skip for silent vix_check noise) ─────
      - name: Notify on failure
        if: failure() && env.RUN_TYPE != 'vix_check'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ Market Bot failed (RUN_TYPE=${{ env.RUN_TYPE }}). Check: ${{ github.server_url }}/${{ github.repository }}/actions" \
            -d parse_mode="HTML"
